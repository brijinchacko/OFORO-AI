# ═══════════════════════════════════════════
# Nginx config for oforo.ai
# Place this at: /etc/nginx/sites-available/oforo.ai
# Then symlink: ln -s /etc/nginx/sites-available/oforo.ai /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name oforo.ai www.oforo.ai;
    return 301 https://oforo.ai$request_uri;
}

# www → non-www redirect (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.oforo.ai;

    ssl_certificate /etc/letsencrypt/live/oforo.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oforo.ai/privkey.pem;

    return 301 https://oforo.ai$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oforo.ai;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/oforo.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oforo.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Request size (for file uploads)
    client_max_body_size 50M;

    # Proxy to Next.js (port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE support (for streaming chat responses)
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache public files
    location /public/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
